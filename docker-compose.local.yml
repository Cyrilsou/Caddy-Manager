# =============================================================================
# Caddy Control Panel — LOCAL MODE (no domain, no HTTPS on panel)
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d --build
#
# Access:
#   http://<VM-IP>:8080        (panel)
#   http://localhost:8080      (from the VM itself)
#
# The panel runs behind nginx (no Caddy for the UI).
# Caddy still runs for managed domains (reverse proxy for your apps).
#
# SECURITY: Caddy admin API binds to localhost:2019 only.
# Ensure your firewall blocks port 2019 from external access:
#   sudo iptables -A INPUT -p tcp --dport 2019 -s 127.0.0.1 -j ACCEPT
#   sudo iptables -A INPUT -p tcp --dport 2019 -j DROP
# =============================================================================

services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile.local
    container_name: caddy-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - ACME_EMAIL=${ACME_EMAIL:-}
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M

  backend:
    build: ./backend
    container_name: caddy-panel-api
    restart: unless-stopped
    networks:
      - panel
      - api_net
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-caddy}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-caddypanel}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CADDY_ADMIN_URL=http://host.docker.internal:2019
      - PANEL_DOMAIN=localhost
      - ALLOWED_IPS=${ALLOWED_IPS:-}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 384M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: caddy-panel-ui
    restart: unless-stopped
    networks:
      - panel
    ports:
      - "${PANEL_PORT:-8080}:8080"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: caddy-panel-db
    restart: unless-stopped
    networks:
      - panel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-caddypanel}
      - POSTGRES_USER=${DB_USER:-caddy}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-caddy} -d ${DB_NAME:-caddypanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: caddy-panel-redis
    restart: unless-stopped
    networks:
      - panel
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 192M

networks:
  panel:
    driver: bridge
  api_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
